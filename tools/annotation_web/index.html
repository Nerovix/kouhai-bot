<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Judge Annotation</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h1>Judge Annotation</h1>
          <button id="sync-btn" class="ghost-btn" type="button">同步新数据</button>
        </div>
        <div class="filter-row">
          <div class="segmented" id="status-tabs">
            <button data-status="pending" class="active" type="button">未标注</button>
            <button data-status="labeled" type="button">已标注</button>
          </div>
        </div>
        <div class="filter-row">
          <label class="field">
            <span>群号</span>
            <select id="group-filter">
              <option value="">全部</option>
            </select>
          </label>
        </div>
        <div class="filter-row">
          <label class="field">
            <span>搜索</span>
            <input id="search-input" type="search" placeholder="题号 / 题名">
          </label>
        </div>
        <div id="bundle-list" class="bundle-list"></div>
      </aside>

      <main class="workspace">
        <header class="workspace-head">
          <div>
            <p class="eyebrow">Solved Problem Review</p>
            <h2 id="problem-title">选择左侧题目开始标注</h2>
          </div>
          <label class="field labeler-field">
            <span>标注者</span>
            <input id="labeler-input" type="text" placeholder="你的名字">
          </label>
        </header>

        <section id="empty-state" class="empty-state">
          <p>左侧会列出所有待标注或已标注的 solved 题目。</p>
        </section>

        <section id="problem-view" class="problem-view hidden">
          <div class="problem-meta" id="problem-meta"></div>
          <section class="statement-panel">
            <div class="panel-head">
              <h3>题面快照</h3>
              <span id="progress-pill" class="pill"></span>
            </div>
            <div id="statement-body" class="statement-body"></div>
          </section>

          <section class="rounds-panel">
            <div class="panel-head">
              <h3>判题轮次</h3>
              <div class="action-row">
                <button id="save-btn" class="primary-btn" type="button">保存</button>
                <button id="complete-btn" class="ghost-btn" type="button">保存并标记已标注</button>
              </div>
            </div>
            <div id="rounds-root" class="rounds-root"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
